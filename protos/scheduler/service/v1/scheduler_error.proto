syntax = "proto3";

package scheduler.service.v1;

import "errors/errors.proto";

option go_package = "github.com/go-tangra/go-tangra-scheduler/gen/go/scheduler/service/v1;schedulerpb";

// SchedulerErrorReason defines error codes for the scheduler service
enum SchedulerErrorReason {
  option (errors.default_code) = 500;

  BAD_REQUEST = 0 [(errors.code) = 400];
  UNAUTHORIZED = 100 [(errors.code) = 401];
  FORBIDDEN = 300 [(errors.code) = 403];
  NOT_FOUND = 400 [(errors.code) = 404];
  CONFLICT = 900 [(errors.code) = 409];
  INTERNAL_SERVER_ERROR = 2000 [(errors.code) = 500];
  SERVICE_UNAVAILABLE = 2300 [(errors.code) = 503];
}
